[custom]
; =========================
; 全局过滤 / 去重（提速）
; =========================
exclude_remarks=(?i)(官网|网址|网站|套餐|流量|traffic|bandwidth|expire|expired|expiring|剩余(?:流量)?|重置|url|到期(?:时间)?|过期|失效|订阅(?:说明|链接|地址)?|subscription|subscribe|查询|续费|频道|telegram|电报|t\.me|客服|售后|工单|m3u|广告|通知|公告|严禁|返利|邀请|防失联|试看|试用|(^|[\s_\-|【\[\(:：])(group|sub)([\s_\-|】\]\):：]|$))
enable_filter=true
filter_script=var __seen = new Set();\nvar __dropName = /(官网|网址|网站|套餐|流量|traffic|bandwidth|expire|expired|expiring|剩余(?:流量)?|重置|到期(?:时间)?|过期|失效|订阅(?:说明|链接|地址)?|subscription|subscribe|查询|续费|频道|telegram|电报|t\\.me|客服|售后|工单|m3u|广告|通知|公告|严禁|返利|邀请|防失联|试看|试用)/i;\nvar __dropHost = /^(?:0\\.0\\.0\\.0|127\\.0\\.0\\.1|localhost|example\\.(?:com|net|org)|test\\.(?:com|net|org))$/i;\nfunction pick(info) {\n  if (!info) return '';\n  for (var i = 1; i < arguments.length; i++) {\n    var value = info[arguments[i]];\n    if (value !== undefined && value !== null && value !== '') return value.toString().toLowerCase();\n  }\n  return '';\n}\nfunction compact(value) {\n  if (value === undefined || value === null) return '';\n  return value.toString().replace(/\\s+/g, ' ').trim().toLowerCase();\n}\nfunction normalizeHost(value) {\n  var host = compact(value);\n  if (!host) return '';\n  return host.replace(/^\\[|\\]$/g, '').replace(/\\.$/, '');\n}\nfunction filter(node){\n  if (!node) return false;\n\n  var info = {};\n  if (node.ProxyInfo) {\n    try { info = JSON.parse(node.ProxyInfo) || {}; } catch (e) { info = {}; }\n  }\n\n  var name = compact(pick(node, 'Name', 'name', 'ProxyName', 'proxyName', 'Remark') || pick(info, 'Remark', 'Name', 'name', 'remarks', 'ps'));\n  if (name && __dropName.test(name)) return false;\n\n  var host = normalizeHost(pick(info, 'Hostname', 'Host', 'Server', 'server', 'address'));\n  var port = compact(pick(info, 'Port', 'port', 'ServerPort', 'server_port'));\n  if (!host || !port) return true;\n  if (__dropHost.test(host)) return false;\n  if (!/^\\d+$/.test(port) || port === '0') return false;\n\n  var key = [\n    pick(info, 'Type', 'ProxyType', 'type'),\n    host,\n    port,\n    pick(info, 'UUID', 'Uuid', 'uuid', 'UserID', 'user_id'),\n    pick(info, 'Password', 'Passwd', 'passwd', 'password'),\n    pick(info, 'EncryptMethod', 'encrypt_method', 'Cipher', 'cipher'),\n    pick(info, 'Network', 'network', 'Net', 'net'),\n    pick(info, 'TLS', 'tls', 'TLSSecure', 'tls_secure'),\n    pick(info, 'ServerName', 'servername', 'SNI', 'sni', 'Peer', 'peer'),\n    pick(info, 'Path', 'path', 'WSPath', 'ws_path', 'GrpcServiceName', 'grpc_service_name'),\n    pick(info, 'Plugin', 'plugin', 'PluginOpts', 'plugin_opts')\n  ].join('|');\n  if (__seen.has(key)) return false;\n  __seen.add(key);\n  if (__seen.size > 50000) __seen.clear();\n  return true;\n}
