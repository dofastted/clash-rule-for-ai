[custom]
; =========================
; 全局过滤 / 去重（提速）
; =========================
exclude_remarks=(?i)(官网|套餐|流量|expire|expiring|剩余|时间|重置|url|到期|过期|机场|订阅|查询|续费|观看|频道|客服|m3u|车费|车友|上车|通知|公告|严禁|(^|\s)(group|sub)(\s|:|$))
enable_filter=true
filter_script=var __seen = new Set();\nfunction pick(info, a, b, c, d, e) {\n  var value = info[a]; if (value !== undefined && value !== null && value !== '') return value.toString().toLowerCase();\n  value = info[b]; if (value !== undefined && value !== null && value !== '') return value.toString().toLowerCase();\n  value = info[c]; if (value !== undefined && value !== null && value !== '') return value.toString().toLowerCase();\n  value = info[d]; if (value !== undefined && value !== null && value !== '') return value.toString().toLowerCase();\n  value = info[e]; if (value !== undefined && value !== null && value !== '') return value.toString().toLowerCase();\n  return '';\n}\nfunction filter(node){\n  if (!node) return false;\n  if (!node.ProxyInfo) return true;\n  var info;\n  try { info = JSON.parse(node.ProxyInfo); } catch (e) { return true; }\n\n  var host = pick(info, 'Hostname', 'Host', 'Server', 'server', 'address');\n  var port = pick(info, 'Port', 'port', 'ServerPort', 'server_port');\n  if (!host || !port) return true;\n\n  var key = pick(info, 'Type', 'ProxyType', 'type') + '|' + host + '|' + port + '|' + pick(info, 'UUID', 'Uuid', 'uuid', 'UserID', 'user_id') + '|' + pick(info, 'Password', 'Passwd', 'passwd', 'password') + '|' + pick(info, 'EncryptMethod', 'encrypt_method', 'Cipher', 'cipher');\n  if (__seen.has(key)) return false;\n  __seen.add(key);\n  if (__seen.size > 50000) __seen.clear();\n  return true;\n}
